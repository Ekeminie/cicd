name: Android Build & Release

on:
  push:
    branches:
      - develop
      - production

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Determine environment
        id: env
        run: |
          BRANCH=${GITHUB_REF##*/}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          if [ "$BRANCH" = "develop" ]; then
            echo "ENV=dev" >> $GITHUB_OUTPUT
          else
            echo "ENV=production" >> $GITHUB_OUTPUT
          fi

      - name: Restore keystore (production only)
        if: steps.env.outputs.ENV == 'production'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties (production only)
        if: steps.env.outputs.ENV == 'production'
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK (dev)
        if: steps.env.outputs.ENV == 'dev'
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=https://controo-backend-staging-7v7xw.ondigitalocean.app \
            --dart-define=USE_FAKE_API=false

      - name: Build APK (production)
        if: steps.env.outputs.ENV == 'production'
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --dart-define=API_BASE_URL=https://controo-backend-staging-7v7xw.ondigitalocean.app \
            --dart-define=USE_FAKE_API=false

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          releaseNotes: |
            Environment: ${{ steps.env.outputs.ENV }}
            Branch: ${{ steps.env.outputs.branch }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
          file: build/app/outputs/flutter-apk/${{ steps.env.outputs.ENV == 'production' && 'app-release.apk' || 'app-debug.apk' }}

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: android-${{ steps.env.outputs.ENV }}-build
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Summary
        if: success()
        run: |
          echo "### Android Build Successful ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ steps.env.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY